<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Streakz — UI</title>
<meta name="viewport" content="width=1800"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: #E8E3DA;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1A1714;
  }
  .page {
    padding: 56px 48px 80px;
  }
  .page-header {
    max-width: 1700px; margin: 0 auto 40px;
  }
  .eyebrow {
    font-size: 12px; font-weight: 600; color: rgba(26,23,20,0.5);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .title {
    font-size: 44px; font-weight: 700; letter-spacing: -1.2px;
    margin-top: 8px; line-height: 1.05;
  }
  .subtitle {
    font-size: 16px; color: rgba(26,23,20,0.62); margin-top: 12px; max-width: 640px;
    line-height: 1.5;
  }
  .frames {
    display: flex; gap: 36px; justify-content: center; flex-wrap: wrap;
    max-width: 1800px; margin: 0 auto;
  }
  .frame-col {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .frame-label {
    font-size: 13px; font-weight: 600; color: rgba(26,23,20,0.7);
    letter-spacing: 0.4px;
  }
  .frame-sub {
    font-size: 12px; color: rgba(26,23,20,0.45); margin-top: -10px;
  }
  .divider {
    height: 1px; background: rgba(26,23,20,0.1); max-width: 1700px;
    margin: 56px auto 0;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "name": "Harsha",
  "showBg": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const dark = !!tweaks.dark;
  const t = getTheme(dark);

  const screens = [
    { id: 'landing',  label: 'Today',    sub: 'Daily check-in',     Comp: LandingScreen },
    { id: 'tasks',    label: 'Habits',   sub: 'Full list + streaks', Comp: TasksScreen },
    { id: 'settings', label: 'Settings', sub: 'Preferences + data', Comp: SettingsScreen },
    { id: 'profile',  label: 'Profile',  sub: 'Stats + milestones', Comp: ProfileScreen },
  ];

  return (
    <div style={{ background: tweaks.showBg ? (dark ? '#1A1714' : '#E8E3DA') : 'transparent', minHeight: '100vh' }}>
      <div className="page" style={{ color: dark ? '#F4F2EE' : '#1A1714' }}>
        <div className="page-header">
          <div className="eyebrow" style={{ color: dark ? 'rgba(244,242,238,0.5)' : 'rgba(26,23,20,0.5)' }}>
            Streakz · Habit tracker
          </div>
          <div className="title">A clean, calm UI for the daily check-in.</div>
          <div className="subtitle" style={{ color: dark ? 'rgba(244,242,238,0.62)' : 'rgba(26,23,20,0.62)' }}>
            Four screens reachable from a persistent bottom tab bar — Today, Habits, Settings, Profile.
            Per-habit hue accents, streak rings, freeze badges, and the activity heatmap all map to the data
            model in the codebase.
          </div>
        </div>

        <div className="frames">
          {screens.map(s => (
            <div key={s.id} className="frame-col">
              <AndroidDevice width={412} height={892} dark={dark}>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <s.Comp dark={dark} name={tweaks.name}/>
                </div>
              </AndroidDevice>
              <div className="frame-label" style={{ color: dark ? 'rgba(244,242,238,0.7)' : 'rgba(26,23,20,0.7)' }}>
                {s.label}
              </div>
              <div className="frame-sub" style={{ color: dark ? 'rgba(244,242,238,0.45)' : 'rgba(26,23,20,0.45)', marginTop: -10 }}>
                {s.sub}
              </div>
            </div>
          ))}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakToggle label="Dark mode" value={dark} onChange={v => setTweak('dark', v)}/>
          <TweakToggle label="Show background" value={tweaks.showBg} onChange={v => setTweak('showBg', v)}/>
        </TweakSection>
        <TweakSection title="Content">
          <TweakText label="User name" value={tweaks.name} onChange={v => setTweak('name', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
